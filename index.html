<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Study AI Tutor Pro</title>
<style>
  :root {
    --bg: #080f1e; --card: #0f172a; --accent: #f472b6; --text: #e2e8f0; --muted: #64748b;
  }
  *{box-sizing:border-box; margin:0; padding:0; font-family: 'Segoe UI', 'Hind Siliguri', sans-serif;}
  body{background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 50px;}

  /* Header & Navigation */
  .header{background: linear-gradient(135deg,#0f172a,#1e1b4b); border-bottom: 1px solid #1e293b; position: sticky; top: 0; z-index: 100;}
  .header-inner{max-width: 600px; margin: 0 auto; padding: 12px 16px;}
  .header-top{display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;}
  .title-main{font-size: 20px; font-weight: 900; background: linear-gradient(90deg,#f472b6,#a5b4fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
  
  .net-pill{padding: 4px 10px; border-radius: 12px; font-size: 10px; font-weight: 700;}
  .net-on{background: #064e3b; color: #4ade80; border: 1px solid #065f46;}
  .net-off{background: #450a0a; color: #f87171; border: 1px solid #7f1d1d;}

  .tabs{display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none;}
  .tab-btn{padding: 8px 16px; border-radius: 10px; border: none; background: #1e293b; color: var(--muted); font-weight: 700; white-space: nowrap; cursor: pointer;}
  .tab-btn.active{background: linear-gradient(135deg,#f472b6,#a855f7); color: white;}

  /* Cards & Layout */
  .wrap{max-width: 600px; margin: 0 auto; padding: 16px;}
  .card{background: var(--card); border: 1px solid #1e293b; border-radius: 16px; padding: 16px; margin-bottom: 16px;}
  
  .stat-grid{display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px;}
  .stat-box{background: #111827; padding: 12px; border-radius: 12px; text-align: center;}
  .stat-num{font-size: 18px; font-weight: 900; color: #f1f5f9; display: block;}
  .stat-lbl{font-size: 10px; color: var(--muted); text-transform: uppercase;}

  .topic-item{display: flex; align-items: center; gap: 12px; padding: 14px; background: #111827; border-radius: 12px; margin-top: 10px; border: 1px solid transparent;}
  .topic-item:active{border-color: var(--accent);}
  .btn-start{margin-left: auto; background: none; border: none; color: var(--accent); font-weight: 700; cursor: pointer;}

  /* Tutor Interface */
  .tutor-bubble{display: flex; gap: 10px; background: #1e1b4b; padding: 15px; border-radius: 15px; border: 1px solid #4338ca; margin-bottom: 15px;}
  .btn-main{width: 100%; padding: 12px; border-radius: 12px; border: none; background: linear-gradient(135deg,#f472b6,#a855f7); color: white; font-weight: 700; font-size: 15px; cursor: pointer;}

  /* Admin */
  .admin-input{width: 100%; padding: 12px; background: #111827; border: 1px solid #334155; color: white; border-radius: 10px; margin: 10px 0;}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div>
        <div style="font-size: 9px; letter-spacing: 2px; color: var(--accent);">STUDY AI TUTOR</div>
        <div class="title-main">তোমার ব্যক্তিগত শিক্ষক</div>
      </div>
      <div id="netStatus" class="net-pill net-on">🟢 অনলাইন AI মোড</div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" id="tab-home" onclick="nav('home')">🏠 হোম</button>
      <button class="tab-btn" id="tab-learn" onclick="nav('learn')">📘 শেখো</button>
      <button class="tab-btn" id="tab-admin" onclick="nav('admin')">⚙️ অ্যাডমিন</button>
    </div>
  </div>
</div>

<div class="wrap" id="app"></div>

<script>
// --- ১) ডাটা সেটিংস (Study Planner v3 থেকে নেওয়া) ---
const RAW_TOPICS = [
  {subj:"বাংলা ২য়",topic:"পরিচ্ছেদ ১৭ ও ১৮: শব্দের শ্রেণিবিভাগ + বিশেষ্য",icon:"✍️"},
  {subj:"ভূগোল",topic:"৬ষ্ঠ অধ্যায়",icon:"🌐"},
  {subj:"গণিত",topic:"বীজগণিত: অনুশীলনী ২.২",icon:"🔢"},
  {subj:"বিজ্ঞান",topic:"৪র্থ অধ্যায়",icon:"🔬"},
  {subj:"ইংরেজি ১ম",topic:"Unit Four: Events and Festivals",icon:"🇬🇧"},
  {subj:"বাংলা ১ম",topic:"পল্লী সাহিত্য (গদ্য)",icon:"📖"},
  {subj:"আইসিটি",topic:"১ম অধ্যায়",icon:"💻"},
  {subj:"ইসলাম শিক্ষা",topic:"৩য় অধ্যায়: ইবাদত",icon:"☪️"},
  {subj:"বাংলাদেশ ও বিশ্বপরিচয়",topic:"৫ম অধ্যায়",icon:"🌍"},
  {subj:"অর্থনীতি",topic:"৪র্থ অধ্যায়",icon:"💰"}
  // আপনি এখানে আপনার আগের ৫০টি টপিক পেস্ট করতে পারেন।
];

let state = JSON.parse(localStorage.getItem('ai_tutor_pro')) || {
  startDate: new Date().toISOString().split('T')[0],
  xp: 0,
  level: 1,
  streak: 0,
  completed: [],
  currentTab: 'home',
  selectedTopic: null
};

function save() { localStorage.setItem('ai_tutor_pro', JSON.stringify(state)); }

// --- ২) রুটিন লজিক (Planner v3 স্টাইল) ---
function getTodaysTopics() {
  const start = new Date(state.startDate);
  const today = new Date();
  const diffDays = Math.floor((today - start) / (1000 * 60 * 60 * 24));
  
  if (diffDays < 0) return []; // রুটিন শুরু হয়নি
  
  const idx = diffDays * 2;
  return RAW_TOPICS.slice(idx, idx + 2);
}

// --- ৩) নেভিগেশন ও রেন্ডার ---
function nav(t) {
  state.currentTab = t;
  render();
}

function startLearning(topic) {
  state.selectedTopic = topic;
  state.currentTab = 'learn';
  render();
}

function render() {
  save();
  const app = document.getElementById('app');
  const todays = getTodaysTopics();

  // আপডেট ট্যাব হাইলাইট
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + state.currentTab).classList.add('active');

  if (state.currentTab === 'home') {
    app.innerHTML = `
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span style="font-size:14px; font-weight:800;">স্বাগতম 👋</span>
          <span style="font-size:20px;">🔥 ${state.streak} দিন</span>
        </div>
        <h2 style="margin-top:5px;">আজকের লক্ষ্য পূরণ করো</h2>
        <div class="stat-grid">
          <div class="stat-box"><span class="stat-num">${state.xp}</span><span class="stat-lbl">XP</span></div>
          <div class="stat-box"><span class="stat-num">${state.level}</span><span class="stat-lbl">লেভেল</span></div>
          <div class="stat-box"><span class="stat-num">${state.completed.length}/50</span><span class="stat-lbl">শেষ</span></div>
        </div>
      </div>

      <div class="card">
        <h3 style="font-size:14px; margin-bottom:10px;">📅 আজকের পড়া</h3>
        ${todays.length === 0 ? '<p style="color:var(--muted); text-align:center;">রুটিন অনুযায়ী আজ কোনো পড়া নেই। অ্যাডমিন থেকে তারিখ ঠিক করুন।</p>' : ''}
        ${todays.map(t => `
          <div class="topic-item">
            <span style="font-size:24px;">${t.icon}</span>
            <div>
              <div style="font-size:10px; color:var(--accent); font-weight:700;">${t.subj}</div>
              <div style="font-size:13px; font-weight:600;">${t.topic}</div>
            </div>
            <button class="btn-start" onclick='startLearning(${JSON.stringify(t)})'>শুরু করো ›</button>
          </div>
        `).join('')}
      </div>
    `;
  } 

  else if (state.currentTab === 'learn') {
    if (!state.selectedTopic) {
      app.innerHTML = `<div class="card" style="text-align:center;">আগে হোম পেজ থেকে একটি টপিক বেছে নাও।</div>`;
      return;
    }
    
    app.innerHTML = `
      <div class="tutor-bubble">
        <div style="font-size:24px;">🧑‍🏫</div>
        <div>
          <p style="font-size:14px; line-height:1.6;">
            আজ আমরা <b>"${state.selectedTopic.topic}"</b> (${state.selectedTopic.subj}) নিয়ে আলোচনা করব। 
            <br><br>
            ${navigator.onLine ? 'আমি প্রস্তুত! এই টপিকটি তোমাকে সহজভাবে বুঝিয়ে দিচ্ছি। তুমি কি শুরু করতে চাও?' : '🔴 তুমি অফলাইনে আছো। ইন্টারনেট কানেক্ট করলে আমি তোমাকে বিস্তারিত বুঝিয়ে বলতে পারব।'}
          </p>
        </div>
      </div>
      <button class="btn-main" onclick="completeTopic()">✅ হ্যাঁ, আমি প্রস্তুত!</button>
    `;
  }

  else if (state.currentTab === 'admin') {
    app.innerHTML = `
      <div class="card">
        <h3>⚙️ অ্যাডমিন প্যানেল</h3>
        <p style="font-size:12px; color:var(--muted); margin:10px 0;">রুটিন কবে থেকে শুরু হবে তার তারিখ সেট করো।</p>
        
        <label style="font-size:12px; font-weight:700;">রুটিন শুরুর তারিখ:</label>
        <input type="date" id="adminDate" class="admin-input" value="${state.startDate}">
        
        <button class="btn-main" onclick="saveAdmin()">সেভ সেটিংস</button>
        <button class="btn-main" style="margin-top:10px; background:#1e293b;" onclick="resetAll()">সব রিসেট করো</button>
      </div>
    `;
  }
}

// --- ৪) অ্যাডমিন ফাংশনস ---
function saveAdmin() {
  const d = document.getElementById('adminDate').value;
  if(d) {
    state.startDate = d;
    alert('সেটিংস সেভ হয়েছে!');
    nav('home');
  }
}

function completeTopic() {
  if(!navigator.onLine) { alert('ইন্টারনেট ছাড়া AI কাজ করবে না!'); return; }
  state.xp += 20;
  state.level = Math.floor(state.xp / 100) + 1;
  state.completed.push(state.selectedTopic.topic);
  alert('চমৎকার! তুমি ২০ XP পেয়েছো।');
  state.selectedTopic = null;
  nav('home');
}

function resetAll() {
  if(confirm('তুমি কি সব প্রগ্রেস মুছে ফেলতে চাও?')) {
    localStorage.removeItem('ai_tutor_pro');
    location.reload();
  }
}

// নেটওয়ার্ক চেক
window.addEventListener('online', () => { 
  document.getElementById('netStatus').className = "net-pill net-on"; 
  document.getElementById('netStatus').innerText = "🟢 অনলাইন AI মোড";
});
window.addEventListener('offline', () => { 
  document.getElementById('netStatus').className = "net-pill net-off"; 
  document.getElementById('netStatus').innerText = "🔴 অফলাইন মোড";
});

render();
</script>
</body>
</html>
