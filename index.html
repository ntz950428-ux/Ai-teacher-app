<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Study AI Tutor</title>
<style>
  /* আপনার আগের সব CSS স্টাইল এখানে থাকবে... */
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0b1120;color:#e2e8f0;font-family:'Segoe UI','Hind Siliguri',system-ui,sans-serif;min-height:100vh}
  
  .header{background:linear-gradient(135deg,#131a2e,#1e1b4b);border-bottom:1px solid #1e293b;position:sticky;top:0;z-index:20;}
  .header-inner{max-width:680px;margin:0 auto;padding:12px 16px}
  .header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .title-label{font-size:10px;letter-spacing:2px;color:#f472b6;font-weight:700;}
  .title-main{font-size:20px;font-weight:900;color:#f1f5f9}
  
  .net-pill{border-radius:20px;padding:5px 12px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:6px}
  .net-on{background:#064e3b;color:#4ade80;border:1px solid #065f46}
  .net-off{background:#450a0a;color:#f87171;border:1px solid #7f1d1d}

  .tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:5px}
  .tab-btn{padding:8px 16px;border-radius:10px;border:none;font-size:13px;font-weight:600;white-space:nowrap;background:#1e293b;color:#94a3b8}
  .tab-active{background:#f472b6;color:white}
  .tab-admin{background:#334155;color:#e2e8f0}

  .wrap{max-width:680px;margin:0 auto;padding:16px}
  .card{background:#111827;border:1px solid #1e293b;border-radius:16px;padding:16px;margin-bottom:16px}
  
  /* Admin Panel specific */
  .admin-input{width:100%;padding:12px;background:#1e293b;border:1px solid #334155;color:white;border-radius:8px;margin-bottom:10px}
  .btn-save{background:#22c55e;color:white;padding:12px;border:none;border-radius:8px;width:100%;font-weight:700}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div>
        <div class="title-label">STUDY AI TUTOR</div>
        <div class="title-main">তোমার ব্যক্তিগত শিক্ষক</div>
      </div>
      <div id="netStatus" class="net-pill net-on">🟢 অনলাইন AI মোড</div>
    </div>
    <div class="tabs">
      <button class="tab-btn tab-active" onclick="showTab('home')">🏠 হোম</button>
      <button class="tab-btn" onclick="showTab('learn')">📘 শেখো</button>
      <button class="tab-btn" onclick="showTab('admin')">⚙️ অ্যাডমিন</button>
    </div>
  </div>
</div>

<div class="wrap" id="mainContent">
  <!-- Content will load here via JavaScript -->
</div>

<script>
// ১. রুটিন ডেটা এবং সাবজেক্ট (আগের মতই রাখা হয়েছে)
const TOPICS = [
  {subj:"বাংলা ২য়",topic:"পরিচ্ছেদ ১৭ ও ১৮: শব্দের শ্রেণিবিভাগ + বিশেষ্য",icon:"✍️"},
  {subj:"ভূগোল",topic:"৬ষ্ঠ অধ্যায়",icon:"🌐"},
  // আরও সাবজেক্ট এখানে যোগ করতে পারেন...
];

// ২. অ্যাডমিন সেটিংস লোড করা
let settings = JSON.parse(localStorage.getItem('study_settings')) || {
  routineStart: "2026-07-20",
  activeTab: "home"
};

// ৩. অনলাইন/অফলাইন চেক করার উন্নত লজিক
function updateNetStatus() {
  const pill = document.getElementById('netStatus');
  if (navigator.onLine) {
    pill.innerHTML = "🟢 অনলাইন AI মোড";
    pill.className = "net-pill net-on";
  } else {
    pill.innerHTML = "🔴 অফলাইন মোড";
    pill.className = "net-pill net-off";
  }
}
window.addEventListener('online', updateNetStatus);
window.addEventListener('offline', updateNetStatus);

// ৪. ট্যাব সুইচিং ফাংশন
function showTab(tab) {
  settings.activeTab = tab;
  render();
}

// ৫. রেন্ডার ফাংশন (UI তৈরি)
function render() {
  const container = document.getElementById('mainContent');
  const tab = settings.activeTab;
  
  // ট্যাব হাইলাইট ঠিক করা
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.remove('tab-active');
    if(btn.innerText.toLowerCase().includes(tab === 'admin' ? 'অ্যাডমিন' : (tab === 'home' ? 'হোম' : 'শেখো'))) {
        btn.classList.add('tab-active');
    }
  });

  if (tab === 'home') {
    container.innerHTML = `
      <div class="card">
        <p class="title-label">স্বাগতম 👋</p>
        <h2 style="margin:8px 0">আজকের লক্ষ্য পূরণ করো</h2>
        <div style="display:flex; justify-content:space-between; margin-top:20px">
           <div style="text-align:center"><strong>0</strong><br><small>XP</small></div>
           <div style="text-align:center"><strong>1</strong><br><small>লেভেল</small></div>
           <div style="text-align:center"><strong>0/50</strong><br><small>টপিক শেষ</small></div>
        </div>
      </div>
      <div class="card">
        <p>📅 আজকের পড়া (${settings.routineStart} থেকে চালু)</p>
        ${TOPICS.map(t => `
          <div style="display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid #1e293b">
            <span style="font-size:24px">${t.icon}</span>
            <div style="flex:1">
              <div style="color:#f472b6; font-size:11px; font-weight:700">${t.subj}</div>
              <div style="font-weight:600">${t.topic}</div>
            </div>
            <button style="background:none; border:none; color:#94a3b8">শুরু করো ›</button>
          </div>
        `).join('')}
      </div>
    `;
  } 
  
  else if (tab === 'learn') {
    // এখানে অফলাইন মোড হ্যান্ডলিং
    if (!navigator.onLine) {
        container.innerHTML = `
          <div class="card" style="border-color:#7f1d1d; background:#1a0b0b">
            <p style="color:#f87171">🔴 অফলাইন মোড: নিচের কনটেন্ট সাধারণ নির্দেশনা। ইন্টারনেট থাকলে বিস্তারিত AI ব্যাখ্যা পাবে।</p>
          </div>
          <div class="card">
            <h3>📖 সারসংক্ষেপ</h3>
            <p style="margin-top:10px; color:#94a3b8">বই থেকে মূল পরিচ্ছেদটি পড়ুন। নেট কানেক্ট হলে AI টিউটর এখানে ব্যাখ্যা দেখাবে।</p>
          </div>
        `;
    } else {
        container.innerHTML = `
          <div class="card">
            <div style="display:flex; gap:10px; align-items:center">
              <span style="background:#1e293b; padding:10px; border-radius:50%">🧑‍🏫</span>
              <p>আজ আমরা "${TOPICS[0].topic}" শিখব। তুমি কি প্রস্তুত? 😊</p>
            </div>
          </div>
          <button class="btn-save" style="background:#f472b6">✅ হ্যাঁ, প্রস্তুত!</button>
        `;
    }
  }

  else if (tab === 'admin') {
    container.innerHTML = `
      <div class="card">
        <h3>⚙️ অ্যাডমিন প্যানেল</h3>
        <p style="margin:10px 0; font-size:13px; color:#94a3b8">রুটিন শুরুর তারিখ সেট করো। এর উপর ভিত্তি করে প্রতিদিনের পড়া দেখাবে।</p>
        <label style="font-size:12px">রুটিন শুরুর তারিখ:</label>
        <input type="date" id="startDate" class="admin-input" value="${settings.routineStart}">
        <button class="btn-save" onclick="saveAdminSettings()">সেভ সেটিংস</button>
      </div>
    `;
  }
}

// ৬. অ্যাডমিন সেটিংস সেভ করা
function saveAdminSettings() {
  const date = document.getElementById('startDate').value;
  if(date) {
    settings.routineStart = date;
    localStorage.setItem('study_settings', JSON.stringify(settings));
    alert('সেটিংস সেভ হয়েছে!');
    showTab('home');
  }
}

// প্রথমবার রেন্ডার
updateNetStatus();
render();
</script>

</body>
</html>
