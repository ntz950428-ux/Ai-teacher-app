const SUBJECT_ORDER = ["বাংলা ১ম","ইংরেজি ১ম","গণিত","বিজ্ঞান","বাংলা ২য়",

function interleaveBySubject(items){
  const groups={};
  items.forEach(it=>{ if(!groups[it.subj])groups[it.subj]=[]; groups[it.subj].push(it); });
  const order=SUBJECT_ORDER.filter(s=>groups[s]);
  const result=[]; let round=0, remaining=true;
  while(remaining){
    remaining=false;
    const off=round%order.length;
    const rotated=order.slice(off).concat(order.slice(0,off));
    rotated.forEach(subj=>{ if(groups[subj].length){ result.push(groups[subj].shift()); remaining=true; } });
    round++;
  }
  return result;
}

const ROUTINE_START="2026-07-20", ROUTINE_END="2026-09-02", EXAM_DATE="2026-09-03";
function addDays(dateStr,n){const d=new Date(dateStr+"T00:00:00");d.setDate(d.getDate()+n);return d.toISOString().split("T")[0];}
function dateDiffDays(a,b){return Math.round((new Date(b+"T00:00:00")-new Date(a+"T00:00:00"))/86400000);}
function todayStr(){return new Date().toISOString().split("T")[0];}

// প্রতিটি দিনে কোন টপিক পড়া হবে তার লিস্ট বানানো (Study Planner-এর সাথে হুবহু মিলিয়ে)
function buildSchedule(){
  const plan=[]; const totalDays=dateDiffDays(ROUTINE_START,ROUTINE_END)+1;
  let topicIdx=0;
  for(let i=0;i<totalDays;i++){
    const date=addDays(ROUTINE_START,i);
    const dayObj={date,topics:[]};
    if(date===addDays(ROUTINE_END,-1)){ dayObj.note="mock"; }
    else if(date===ROUTINE_END){ dayObj.note="final"; }
    else if(topicIdx<NEW_TOPICS.length){
      for(let s=0;s<2 && topicIdx<NEW_TOPICS.length;s++) dayObj.topics.push(NEW_TOPICS[topicIdx++]);
    } else { dayObj.note="revision"; }
    plan.push(dayObj);
  }
  return plan;
}
const SCHEDULE = buildSchedule();
function scheduleForDate(d){ return SCHEDULE.find(x=>x.date===d); }
function todaysTopics(){
  const t=todayStr();
  if(t<ROUTINE_START) return {status:"before",topics:[]};
  if(t>ROUTINE_END) return {status:"after",topics:[]};
  const s=scheduleForDate(t);
  if(!s) return {status:"none",topics:[]};
  if(s.note==="mock") return {status:"mock",topics:[]};
  if(s.note==="final") return {status:"final",topics:[]};
  if(s.note==="revision"){
    // রিভিশন-পর্বে সব টপিক থেকে ২টা এলোমেলোভাবে বাছাই
    const idx=dateDiffDays(ROUTINE_START,t);
    const a=NEW_TOPICS_RAW[idx%NEW_TOPICS_RAW.length], b=NEW_TOPICS_RAW[(idx+7)%NEW_TOPICS_RAW.length];
    return {status:"revision",topics:[a,b]};
  }
  return {status:"ok",topics:s.topics};
}

let ONLINE = navigator.onLine;
function setNetPill(){
  const el=document.getElementById("netPill");
  el.textContent = ONLINE ? "🟢 অনলাইন AI মোড" : "🔴 অফলাইন মোড";
  el.className = "net-pill " + (ONLINE?"net-on":"net-off");
}
window.addEventListener("online",()=>{ONLINE=true;setNetPill();});
window.addEventListener("offline",()=>{ONLINE=false;setNetPill();});

async function callClaude(system, userPrompt){
  try{
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:1000,
        system: system,
        messages:[{role:"user",content:userPrompt}]
      })
    });
    if(!res.ok) throw new Error("api error");
    const data = await res.json();
    const text = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
    ONLINE = true; setNetPill();
    return text;
  }catch(e){
    ONLINE = false; setNetPill();
    return null;
  }
}
function parseJSON(text){
  if(!text) return null;
  try{
    const cleaned = text.replace(/```json|```/g,"").trim();
    return JSON.parse(cleaned);
  }catch(e){ return null; }
}

async function getStore(key, fallback){
  try{ const r=await window.storage.get(key,false); return r?JSON.parse(r.value):fallback; }
  catch(e){ return fallback; }
}
async function setStore(key, val){
  try{ await window.storage.set(key, JSON.stringify(val), false); }catch(e){}
}

async function saveProfile(p){ await setStore("profile",p); }

async function saveProgress(p){ await setStore("progress",p); }
async function getContentCache(topicId){
  return await getStore("content:"+topicId,{learn:null,mcq:null,cq:null});
}
async function saveContentCache(topicId,val){ await setStore("content:"+topicId,val); }

function levelFromXP(xp){ return Math.floor(xp/100)+1; }
const BADGE_DEFS = [
  {id:"streak3",label:"🔥 ৩ দিনের streak",check:p=>p.streak>=3},
  {id:"streak7",label:"🔥🔥 ৭ দিনের streak",check:p=>p.streak>=7},
  {id:"xp100",label:"⭐ ১০০ XP",check:p=>p.xp>=100},
  {id:"xp500",label:"🏆 ৫০০ XP",check:p=>p.xp>=500},
  {id:"level5",label:"🎖️ লেভেল ৫",check:p=>p.level>=5},
];
async function addXP(amount){
  const p = await getProfile();
  const t = todayStr();
  if(p.lastActiveDate !== t){
    const y = addDays(t,-1);
    p.streak = (p.lastActiveDate===y) ? p.streak+1 : 1;
    p.lastActiveDate = t;
  }
  p.xp += amount;
  p.level = levelFromXP(p.xp);
  BADGE_DEFS.forEach(b=>{ if(b.check(p) && !p.badges.includes(b.id)) p.badges.push(b.id); });
  await saveProfile(p);
  return p;
}
async function recordResult(subj,topic,mode,score,total,wrong){
  await recordResultRaw(subj,topic,mode,score,total,wrong);
  await addXP(Math.max(2,score*2));
}
async function recordResultRaw(subj,topic,mode,score,total,wrong){
  const pr = await getProgress();
  pr.results.push({date:todayStr(),subj,topic,mode,score,total});
  if(wrong){
    const key = subj+" — "+topic;
    if(!pr.weak[key]) pr.weak[key]={count:0,subj,topic};
    pr.weak[key].count += 1;
  }
  await saveProgress(pr);
}
async function toggleBookmark(item){
  const pr = await getProgress();
  const exists = pr.bookmarks.find(b=>b.q===item.q);
  if(exists) pr.bookmarks = pr.bookmarks.filter(b=>b.q!==item.q);
  else pr.bookmarks.push(item);
  await saveProgress(pr);
  return !exists;
}

/* --- Dynamic Daily Challenge: প্রতিদিন তারিখ অনুযায়ী ভিন্ন চ্যালেঞ্জ, আসল প্রগ্রেসের সাথে মিলিয়ে --- */
const DAILY_CHALLENGES = [
  {id:"answer5", label:"আজ অন্তত ৫টি প্রশ্নের উত্তর দাও", target:5, xp:25,
    progress: results => results.length},
  {id:"cq1", label:"আজ অন্তত ১টি সৃজনশীল (CQ) প্রশ্ন সমাধান করো", target:1, xp:20,
    progress: results => results.filter(r=>r.mode==="cq").length},
  {id:"explain1", label:"আজ \"আমি কী বুঝেছি?\" ব্যবহার করে ১টি টপিক ব্যাখ্যা করো", target:1, xp:15,
    progress: results => results.filter(r=>r.mode==="explain").length},
  {id:"mcq5", label:"আজ ৫টি MCQ সমাধান করো", target:5, xp:20,
    progress: results => results.filter(r=>r.mode==="mcq").length},
  {id:"subj2", label:"আজ অন্তত ২টি ভিন্ন বিষয় থেকে প্রশ্ন সমাধান করো", target:2, xp:20,
    progress: results => new Set(results.map(r=>r.subj)).size},
  {id:"mock1", label:"আজ একটি মক টেস্ট অংশ নাও", target:1, xp:30,
    progress: results => results.filter(r=>r.subj==="সব বিষয়").length},
  {id:"score80", label:"আজ অন্তত ৮টি প্রশ্নের সঠিক উত্তর দাও", target:8, xp:35,
    progress: results => results.reduce((a,r)=>a+r.score,0)},
];
function dayOfYear(dstr){
  const d = new Date(dstr+"T00:00:00");
  const start = new Date(d.getFullYear(),0,0);
  return Math.floor((d-start)/86400000);
}
async function getDailyChallenge(){
  const idx = dayOfYear(todayStr()) % DAILY_CHALLENGES.length;
  const ch = DAILY_CHALLENGES[idx];
  const pr = await getProgress();
  const todays = pr.results.filter(r=>r.date===todayStr());
  const prog = Math.min(ch.target, ch.progress(todays));
  const done = prog >= ch.target;
  if(done){
    const profile = await getProfile();
    if(profile.lastChallengeDate !== todayStr()+":"+ch.id){
      profile.lastChallengeDate = todayStr()+":"+ch.id;
      profile.xp += ch.xp;
      profile.level = levelFromXP(profile.xp);
      await saveProfile(profile);
    }
  }
  return {...ch, prog, done};
}

  resultEl.innerHTML = `<div class="loading"><div class="spinner"></div>বিশ্লেষণ করা হচ্ছে...</div>`;
  const t = SELECTED_TOPIC;
  const sys = "তুমি একজন সহায়ক বাংলা AI শিক্ষক। শিক্ষার্থীর নিজের ভাষায় লেখা ব্যাখ্যা বিশ্লেষণ করবে। শুধু বিশুদ্ধ JSON দেবে: {\"correct\":[\"...\"],\"wrong\":[\"...\"],\"missing\":[\"...\"],\"modelExplanation\":\"...\"}";

  if(!res){
    resultEl.innerHTML = `<div class="feedback-box">🔴 এখন ইন্টারনেট নেই বা AI সাড়া দেয়নি, তাই মূল্যায়ন করা যায়নি। ইন্টারনেট কানেক্ট করে আবার চেষ্টা করো।</div>`;
    return;
  }
  await addXP(5);
  await recordResultRaw(t.subj, t.topic, "explain", 1, 1);
  resultEl.innerHTML = `
    ${tutorBubble(TUTOR_LINES.explainDone())}

      ${res.wrong&&res.wrong.length? `<div style="margin-top:6px">❌ <b>ভুল অংশ:</b> ${res.wrong.join(", ")}</div>`:""}
      ${res.missing&&res.missing.length? `<div style="margin-top:6px">📌 <b>বাদ পড়েছে:</b> ${res.missing.join(", ")}</div>`:""}
      <div class="divider"></div>
      <div><b>মডেল এক্সপ্ল্যানেশন:</b><br>${res.modelExplanation||""}</div>

let CURRENT_QSET = null;
let QMODE = "mcq";

async function renderQA(){

  `;
}

async function generateQuestions(){
  const t = SELECTED_TOPIC;
  const container = document.getElementById("qContainer");
  container.innerHTML = `<div class="loading"><div class="spinner"></div>প্রশ্ন তৈরি হচ্ছে...</div>`;

  if(QMODE==="cq"){
    const sys = "তুমি বাংলাদেশ SSC বোর্ড পরীক্ষার ধাঁচে সৃজনশীল প্রশ্ন (CQ) তৈরি করো। শুধু বিশুদ্ধ JSON: {\"stem\":\"উদ্দীপক\",\"ka\":\"জ্ঞানমূলক প্রশ্ন\",\"kha\":\"অনুধাবনমূলক প্রশ্ন\",\"ga\":\"প্রয়োগমূলক প্রশ্ন\",\"gha\":\"উচ্চতর দক্ষতামূলক প্রশ্ন\"}";
    const usr = `বিষয়: ${t.subj}, টপিক: ${t.topic}। একটি সম্পূর্ণ বোর্ড-স্টাইল সৃজনশীল প্রশ্ন (উদ্দীপকসহ ক,খ,গ,ঘ) তৈরি করো। প্রতিবার নতুন ও ভিন্ন প্রশ্ন দিও।`;
    const raw = navigator.onLine ? await callClaude(sys, usr) : null;
    const cq = parseJSON(raw);
    if(!cq){ container.innerHTML = `<div class="empty">🔴 অফলাইনে সৃজনশীল প্রশ্ন তৈরি করা যায় না — ইন্টারনেট কানেক্ট করো।</div>`; return; }
    CURRENT_QSET = {type:"cq", data:cq};
    updateTutorBubble("qaBubble", TUTOR_LINES.cqReady());
    container.innerHTML = renderQSet();
    return;
  }

  const typeMap = {mcq:"MCQ (৪টি অপশনসহ)",short:"সংক্ষিপ্ত প্রশ্ন",tf:"সত্য/মিথ্যা",fill:"শূন্যস্থান পূরণ",one:"এক কথায় উত্তর"};
  const sys = `তুমি বাংলাদেশ SSC বোর্ডের ধাঁচে প্রশ্ন তৈরি করো। শুধু বিশুদ্ধ JSON array দেবে। MCQ হলে: [{"q":"...","options":["...","...","...","..."],"answer":0,"explain":"..."}]। অন্য সবগুলোর জন্য: [{"q":"...","answer":"...","explain":"..."}]`;
  const usr = `বিষয়: ${t.subj}, টপিক: ${t.topic}। ৩টি ${typeMap[QMODE]} প্রশ্ন তৈরি করো। প্রতিবার নতুন প্রশ্ন দিও, আগে জিজ্ঞেস করা প্রশ্ন এড়িয়ে চলো।`;
  const raw = navigator.onLine ? await callClaude(sys, usr) : null;
  let qs = parseJSON(raw);
  let offline=false;
  if(!qs || !Array.isArray(qs)){
    qs = QMODE==="mcq" ? offlineMCQ(t) : [{q:"অফলাইনে প্রশ্ন তৈরি করা যায়নি, ইন্টারনেট কানেক্ট করো।",answer:"—",explain:""}];
    offline=true;
  } else {
    const cache = await getContentCache(t.id||"tX"); cache.mcq = qs; await saveContentCache(t.id||"tX",cache);
  }
  CURRENT_QSET = {type:QMODE, data:qs, offline, answered:qs.map(()=>null)};
  updateTutorBubble("qaBubble", offline? "ইন্টারনেট না থাকায় সীমিত প্রশ্ন দেখাচ্ছি — কানেক্ট করলে ভালো প্রশ্ন পাবে।" : TUTOR_LINES.beforeQuestion());
  container.innerHTML = renderQSet();
}

function renderQSet(){
  const t = SELECTED_TOPIC;
  if(!CURRENT_QSET) return "";
  if(CURRENT_QSET.type==="cq"){
    const cq = CURRENT_QSET.data;
    return `
    <div class="card">
      <div class="q-text">📋 উদ্দীপক: ${cq.stem}</div>
      <div class="divider"></div>
      <div class="q-text">ক) ${cq.ka}</div><textarea id="cq_ka"></textarea>
      <div class="q-text" style="margin-top:10px">খ) ${cq.kha}</div><textarea id="cq_kha"></textarea>
      <div class="q-text" style="margin-top:10px">গ) ${cq.ga}</div><textarea id="cq_ga"></textarea>
      <div class="q-text" style="margin-top:10px">ঘ) ${cq.gha}</div><textarea id="cq_gha"></textarea>
      <div style="margin-top:10px"></div>
      <button class="btn" onclick="evaluateCQ()">✅ উত্তর জমা দাও ও মূল্যায়ন করো</button>
      <div id="cqResult"></div>
    </div>`;
  }
  return CURRENT_QSET.data.map((q,i)=>{
    if(CURRENT_QSET.type==="mcq"){
      return `<div class="q-block">
        <div class="q-text">${i+1}. ${q.q}</div>
        ${q.options.map((o,oi)=>`<button class="opt" id="opt_${i}_${oi}" onclick="answerMCQ(${i},${oi})">${o}</button>`).join("")}
        <div id="explain_${i}" class="feedback-box" style="display:none"></div>
        <button class="btn-sm btn-sec" onclick='bookmarkQ(${i})'>🔖 বুকমার্ক</button>
      </div>`;
    }
    return `<div class="q-block">
      <div class="q-text">${i+1}. ${q.q}</div>
      <input type="text" id="ans_${i}" placeholder="উত্তর লেখো"/>
      <div style="margin-top:6px"></div>
      <button class="btn-sm" onclick="answerText(${i})">জমা দাও</button>
      <button class="btn-sm btn-sec" onclick='bookmarkQ(${i})'>🔖 বুকমার্ক</button>
      <div id="explain_${i}" class="feedback-box" style="display:none"></div>
    </div>`;
  }).join("");
}

async function answerMCQ(i, oi){
  const q = CURRENT_QSET.data[i];
  if(CURRENT_QSET.answered[i]!==null) return;
  CURRENT_QSET.answered[i]=oi;
  const correct = oi===q.answer;
  document.getElementById(`opt_${i}_${oi}`).classList.add(correct?"correct":"wrong");
  if(!correct) document.getElementById(`opt_${i}_${q.answer}`).classList.add("correct");
  const ex = document.getElementById(`explain_${i}`);
  ex.style.display="block"; ex.textContent = q.explain || (correct?"সঠিক!":"এই কারণে ভুল হয়েছে, উপরে সঠিক উত্তর দেখানো হলো।");
  updateTutorBubble("qaBubble", correct? TUTOR_LINES.correctFeedback() : TUTOR_LINES.wrongFeedback());
  await recordResult(SELECTED_TOPIC.subj, SELECTED_TOPIC.topic, "mcq", correct?1:0, 1, !correct);
}

async function answerText(i){
  const q = CURRENT_QSET.data[i];
  const val = document.getElementById(`ans_${i}`).value.trim();
  const ex = document.getElementById(`explain_${i}`);
  ex.style.display="block";
  ex.innerHTML = `<b>তোমার উত্তর:</b> ${val||"(খালি)"}<br><b>মডেল উত্তর:</b> ${q.answer}<br>${q.explain||""}`;
  updateTutorBubble("qaBubble", val? TUTOR_LINES.correctFeedback() : TUTOR_LINES.wrongFeedback());
  await recordResult(SELECTED_TOPIC.subj, SELECTED_TOPIC.topic, CURRENT_QSET.type, val?1:0, 1, !val);
}

async function bookmarkQ(i){
  const q = CURRENT_QSET.data[i];
  await toggleBookmark({q:q.q, answer:q.answer!==undefined?q.answer:(q.options?q.options[q.answer]:""), subj:SELECTED_TOPIC.subj, topic:SELECTED_TOPIC.topic});
  alert("বুকমার্ক করা হয়েছে ✅");
}

async function evaluateCQ(){
  const t = SELECTED_TOPIC, cq = CURRENT_QSET.data;

    ka: document.getElementById("cq_ka").value,

    gha: document.getElementById("cq_gha").value,
  };
  const resultEl = document.getElementById("cqResult");
  resultEl.innerHTML = `<div class="loading"><div class="spinner"></div>মূল্যায়ন করা হচ্ছে...</div>`;
  const sys = "তুমি একজন SSC বোর্ড পরীক্ষক। সৃজনশীল প্রশ্নের উত্তর মূল্যায়ন করো (নম্বর: ক-১, খ-২, গ-৩, ঘ-৪, মোট ১০)। শুধু বিশুদ্ধ JSON দাও: {\"ka\":{\"score\":0,\"feedback\":\"...\"},\"kha\":{\"score\":0,\"feedback\":\"...\"},\"ga\":{\"score\":0,\"feedback\":\"...\"},\"gha\":{\"score\":0,\"feedback\":\"...\"},\"total\":0,\"modelAnswer\":\"...\",\"suggestion\":\"...\"}";
  const usr = `প্রশ্ন:\nক) ${cq.ka}\nখ) ${cq.kha}\nগ) ${cq.ga}\nঘ) ${cq.gha}\n\nশিক্ষার্থীর উত্তর:\nক) ${ans.ka}\nখ) ${ans.kha}\nগ) ${ans.ga}\nঘ) ${ans.gha}`;
  const raw = await callClaude(sys, usr);
  const res = parseJSON(raw);
  if(!res){ resultEl.innerHTML = `<div class="feedback-box">🔴 মূল্যায়ন করা যায়নি — ইন্টারনেট কানেক্ট করে আবার চেষ্টা করো।</div>`; return; }
  await recordResult(t.subj, t.topic, "cq", res.total, 10, res.total<6);
  updateTutorBubble("qaBubble", TUTOR_LINES.cqDone(res.total));
  resultEl.innerHTML = `
    <div class="feedback-box">
      <div>ক) ${res.ka.score}/১ — ${res.ka.feedback}</div>
      <div style="margin-top:6px">খ) ${res.kha.score}/২ — ${res.kha.feedback}</div>
      <div style="margin-top:6px">গ) ${res.ga.score}/৩ — ${res.ga.feedback}</div>
      <div style="margin-top:6px">ঘ) ${res.gha.score}/৪ — ${res.gha.feedback}</div>
      <div class="divider"></div>
      <div style="font-weight:800">📊 মোট নম্বর: ${res.total}/১০</div>
      <div class="divider"></div>
      <div><b>📝 মডেল উত্তর:</b><br>${res.modelAnswer}</div>
      <div class="divider"></div>
      <div>💬 <b>উন্নতির পরামর্শ:</b> ${res.suggestion}</div>
    </div>`;
}

async function runMock(kind){
  const container = document.getElementById("mockContainer");
  container.innerHTML = `<div class="loading"><div class="spinner"></div>মক টেস্ট তৈরি হচ্ছে...</div>`;
  const idx = dateDiffDays(ROUTINE_START, todayStr());
  let pool;
  if(kind==="weekly") pool = NEW_TOPICS.slice(Math.max(0,idx*2-14), Math.max(2,idx*2));
  else if(kind==="monthly") pool = NEW_TOPICS.slice(Math.max(0,idx*2-60), Math.max(2,idx*2));
  else pool = NEW_TOPICS_RAW;
  if(pool.length===0) pool = NEW_TOPICS_RAW.slice(0,6);
  const sample = [...pool].sort(()=>Math.random()-0.5).slice(0,6);

  if(!navigator.onLine){
    container.innerHTML = `<div class="empty">🔴 মক টেস্ট তৈরি করতে ইন্টারনেট প্রয়োজন। কানেক্ট করে আবার চেষ্টা করো।</div>`;
    return;
  }
  const sys = "তুমি SSC বোর্ড পরীক্ষার ধাঁচে প্রশ্ন তৈরি করো। শুধু বিশুদ্ধ JSON array দাও: [{\"subj\":\"...\",\"topic\":\"...\",\"q\":\"...\",\"options\":[\"..\",\"..\",\"..\",\"..\"],\"answer\":0}]";
  const usr = `নিচের টপিকগুলো থেকে একটি করে MCQ প্রশ্ন তৈরি করো:\n${sample.map(t=>`- ${t.subj}: ${t.topic}`).join("\n")}`;
  const raw = await callClaude(sys, usr);
  const qs = parseJSON(raw);
  if(!qs){ container.innerHTML = `<div class="empty">🔴 মক টেস্ট তৈরি করা যায়নি, আবার চেষ্টা করো।</div>`; return; }
  CURRENT_QSET = {type:"mcq", data:qs, answered:qs.map(()=>null)};
  SELECTED_TOPIC = {subj:"সব বিষয়", topic:kind==="weekly"?"সাপ্তাহিক মক টেস্ট":kind==="monthly"?"মাসিক মক টেস্ট":"পূর্ণাঙ্গ মক টেস্ট", icon:"📝", id:"mock"};
  container.innerHTML = `<div class="card"><div class="card-title">প্রশ্নগুলো (বিষয়সহ)</div></div>` +
    qs.map((q,i)=>`<div class="q-block">
      <div class="muted" style="margin-bottom:4px">${q.subj}</div>
      <div class="q-text">${i+1}. ${q.q}</div>
      ${q.options.map((o,oi)=>`<button class="opt" id="opt_${i}_${oi}" onclick="answerMCQ(${i},${oi})">${o}</button>`).join("")}
      <div id="explain_${i}" class="feedback-box" style="display:none"></div>
    </div>`).join("");
}

/* ============================================================
   ১১) স্ট্যাটস / অ্যানালিটিক্স / গেমিফিকেশন
   ============================================================ */
async function renderStats(){
  const progress = await getProgress();
  const profile = await getProfile();
  const bySubj = {};
  progress.results.forEach(r=>{
    if(!bySubj[r.subj]) bySubj[r.subj]={correct:0,total:0};
    bySubj[r.subj].correct += r.score; bySubj[r.subj].total += r.total;
  });
  const subjRows = Object.entries(bySubj).map(([s,v])=>({subj:s,pct:v.total?Math.round(v.correct/v.total*100):0}));
  subjRows.sort((a,b)=>b.pct-a.pct);
  const strong = subjRows.slice(0,3), weak = subjRows.slice(-3).reverse();
  const totalCorrect = progress.results.reduce((a,r)=>a+r.score,0);
  const totalQ = progress.results.reduce((a,r)=>a+r.total,0);
  const avg = totalQ? Math.round(totalCorrect/totalQ*100):0;

  // দৈনিক প্রগ্রেস (শেষ ৭ দিন)
  const last7 = [...Array(7)].map((_,i)=>addDays(todayStr(),i-6));
  const dayCounts = last7.map(d=>progress.results.filter(r=>r.date===d).length);
  const maxCount = Math.max(1,...dayCounts);

  // সাপ্তাহিক প্রগ্রেস (শেষ ৮ সপ্তাহ)
  const weekLabels = [...Array(8)].map((_,i)=>7-i);
  const weekCounts = weekLabels.map(w=>{
    const from = addDays(todayStr(), -(w*7)+ -6), to = addDays(todayStr(), -(w*7));
    return progress.results.filter(r=>r.date>=from && r.date<=to).length;
  });
  const maxWeek = Math.max(1,...weekCounts);

  // মাসিক প্রগ্রেস (শেষ ৬ মাস)
  const monthKeys = [...Array(6)].map((_,i)=>{
    const d = new Date(); d.setMonth(d.getMonth()-(5-i));
    return d.toISOString().slice(0,7);
  });
  const monthLabels = ["জানু","ফেব্রু","মার্চ","এপ্রি","মে","জুন","জুলা","আগ","সেপ্ট","অক্টো","নভে","ডিসে"];
  const monthCounts = monthKeys.map(mk=>progress.results.filter(r=>r.date.slice(0,7)===mk).length);
  const maxMonth = Math.max(1,...monthCounts);

  const challenge = await getDailyChallenge();

  return `
  <div class="card">
    <div class="card-title">📊 সামগ্রিক পরিসংখ্যান</div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num">${avg}%</div><div class="stat-lbl">গড় স্কোর</div></div>
      <div class="stat-box"><div class="stat-num">${totalCorrect}</div><div class="stat-lbl">সঠিক উত্তর</div></div>
      <div class="stat-box"><div class="stat-num">${totalQ-totalCorrect}</div><div class="stat-lbl">ভুল উত্তর</div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📈 দৈনিক প্রগ্রেস (গত ৭ দিন)</div>
    <div style="display:flex;align-items:flex-end;gap:6px;height:70px">
      ${dayCounts.map((c,i)=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
        <div style="width:100%;background:linear-gradient(180deg,#f472b6,#a855f7);border-radius:4px;height:${Math.max(4,c/maxCount*55)}px"></div>
        <div style="font-size:8.5px;color:#64748b">${last7[i].slice(8,10)}</div>
      </div>`).join("")}
    </div>
  </div>

  <div class="card">
    <div class="card-title">📆 সাপ্তাহিক প্রগ্রেস (গত ৮ সপ্তাহ)</div>
    <div style="display:flex;align-items:flex-end;gap:5px;height:70px">
      ${weekCounts.map((c,i)=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
        <div style="width:100%;background:linear-gradient(180deg,#6366f1,#22c55e);border-radius:4px;height:${Math.max(4,c/maxWeek*55)}px"></div>
        <div style="font-size:8px;color:#64748b">সপ্তা ${8-i}</div>
      </div>`).join("")}
    </div>
  </div>

  <div class="card">
    <div class="card-title">🗓️ মাসিক প্রগ্রেস (গত ৬ মাস)</div>
    <div style="display:flex;align-items:flex-end;gap:8px;height:70px">
      ${monthCounts.map((c,i)=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
        <div style="width:100%;background:linear-gradient(180deg,#f59e0b,#ec4899);border-radius:4px;height:${Math.max(4,c/maxMonth*55)}px"></div>
        <div style="font-size:8.5px;color:#64748b">${monthLabels[parseInt(monthKeys[i].slice(5,7),10)-1]}</div>
      </div>`).join("")}
    </div>
  </div>

  <div class="card">
    <div class="card-title">💪 শক্তিশালী বিষয়</div>
    ${strong.length? strong.map(s=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1e293b"><span style="color:${dotColor(s.subj)}">${s.subj}</span><b>${s.pct}%</b></div>`).join(""):`<div class="muted">এখনো ডেটা নেই</div>`}
  </div>
  <div class="card">
    <div class="card-title">⚠️ দুর্বল বিষয়</div>
    ${weak.length? weak.map(s=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1e293b"><span style="color:${dotColor(s.subj)}">${s.subj}</span><b>${s.pct}%</b></div>`).join(""):`<div class="muted">এখনো ডেটা নেই</div>`}
  </div>

  <div class="card">
    <div class="card-title">🎮 গেমিফিকেশন</div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num">${profile.xp}</div><div class="stat-lbl">মোট XP</div></div>
      <div class="stat-box"><div class="stat-num">${profile.level}</div><div class="stat-lbl">লেভেল</div></div>
      <div class="stat-box"><div class="stat-num">🔥${profile.streak}</div><div class="stat-lbl">Streak</div></div>
    </div>
    <div class="divider"></div>
    <div class="muted" style="margin-bottom:6px">🎯 আজকের Daily Challenge:</div>
    <div style="font-size:12.5px;margin-bottom:8px">${challenge.label} <span class="muted">(+${challenge.xp} XP)</span></div>
    <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${Math.round(challenge.prog/challenge.target*100)}%"></div></div>
    <div class="muted" style="margin-top:4px">${challenge.prog}/${challenge.target} ${challenge.done?"— সম্পন্ন ✅":""}</div>
  </div>

  <div class="card">
    <div class="card-title">⚠️ সব Weak Topics</div>
    ${Object.values(progress.weak).length? Object.values(progress.weak).sort((a,b)=>b.count-a.count).map(w=>`
      <div class="topic-row" onclick='openTopic(${JSON.stringify(NEW_TOPICS_RAW.find(x=>x.subj===w.subj&&x.topic===w.topic)||{subj:w.subj,topic:w.topic,icon:"📌",id:"w"})})'>
        <div style="flex:1"><div class="topic-sub" style="color:${dotColor(w.subj)}">${w.subj}</div><div class="topic-name">${w.topic}</div></div>
        <div class="pill" style="background:#3a0d0d;color:#f87171">${w.count}×</div>
      </div>`).join("") : `<div class="muted">চমৎকার, এখনো কোনো দুর্বল টপিক নেই!</div>`}
  </div>
  `;
}

/* ============================================================
   ১২) সার্চ + বুকমার্ক
   ============================================================ */
async function renderSearch(){
  const progress = await getProgress();
  return `
  <div class="card">
    <div class="card-title">🔎 সাবজেক্ট বা চ্যাপ্টার খোঁজো</div>
    <input type="text" id="searchBox" placeholder="যেমন: গণিত, বীজগণিত, ব্যাকরণ..." oninput="doSearch()"/>
  </div>
  <div id="searchResults"></div>
  <div class="card">
    <div class="card-title">🔖 বুকমার্ক করা প্রশ্ন</div>
    ${progress.bookmarks.length? progress.bookmarks.map(b=>`
      <div class="q-block">
        <div class="muted">${b.subj} — ${b.topic}</div>
        <div class="q-text">${b.q}</div>
        <div class="muted">উত্তর: ${b.answer}</div>
      </div>`).join("") : `<div class="empty">এখনো কিছু বুকমার্ক করোনি</div>`}
  </div>
  `;
}
function doSearch(){
  const q = document.getElementById("searchBox").value.trim().toLowerCase();
  const el = document.getElementById("searchResults");
  if(!q){ el.innerHTML=""; return; }
  const matches = NEW_TOPICS_RAW.filter(t=> t.subj.toLowerCase().includes(q) || t.topic.toLowerCase().includes(q));
  el.innerHTML = matches.length? matches.map(t=>`
    <div class="topic-row" onclick='openTopic(${JSON.stringify(t)})'>
      <div class="topic-icon">${t.icon}</div>
      <div style="flex:1"><div class="topic-sub" style="color:${dotColor(t.subj)}">${t.subj}</div><div class="topic-name">${t.topic}</div></div>
    </div>`).join("") : `<div class="empty">কিছু পাওয়া যায়নি</div>`;
}

/* ============================================================
   INIT
   ============================================================ */
setNetPill();
render();
</script>
</body>
</html>
